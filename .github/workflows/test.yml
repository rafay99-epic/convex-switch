name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun test
      - name: release-style build compiles
        run: bun build ./bin/cvx.ts --compile --minify --outfile /tmp/cvx && /tmp/cvx version
        env:
          CVX_HOME: /tmp/cvx-ci-home
