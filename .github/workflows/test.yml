name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: TEMP windows diagnostics (remove before merge)
        if: runner.os == 'Windows'
        shell: bash
        run: bun scripts/ci-windiag.ts
      - run: bun test
      - name: release-style build compiles
        shell: bash
        run: |
          bun build ./bin/cvx.ts --compile --minify --outfile out/cvx
          ./out/cvx version || ./out/cvx.exe version
        env:
          CVX_HOME: ${{ runner.temp }}/cvx-ci-home
