name: Release

# Build standalone `cvx` binaries for macOS + Linux, publish a GitHub release,
# and bump the Homebrew formula in rafay99-epic/homebrew-apps — no sha256 is
# ever hand-edited. Mirrors the Vitals release flow, adapted for a CLI:
# Bun cross-compiles every target from one Linux runner.

on:
  push:
    branches: [main]
    paths:
      - "bin/**"
      - "src/**"
      - "man/**"
      - "package.json"
      - ".github/workflows/release.yml"
      - ".github/scripts/bump-formula.sh"
      - ".github/scripts/publish-npm.sh"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the commit count = version

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Compute version
        run: echo "VERSION=0.$(git rev-list --count HEAD)" >> "$GITHUB_ENV"

      - name: Stamp version into the binary
        run: |
          sed -i "s|export const VERSION = \"[^\"]*\";|export const VERSION = \"${VERSION}\";|" src/store.ts
          grep -n 'export const VERSION' src/store.ts

      - name: Build binaries (all targets)
        run: |
          set -euo pipefail
          mkdir -p dist
          cp man/cvx.1 dist/cvx.1   # shipped in unix tarballs for `man cvx`
          build() { # <bun-target> <os> <arch> <binname> [extra tar members...]
            local target=$1 os=$2 arch=$3 bin=$4; shift 4
            echo "→ building $os-$arch ($bin)"
            bun build ./bin/cvx.ts --compile --minify --target="bun-$target" --outfile "dist/$bin"
            chmod +x "dist/$bin"
            tar -C dist -czf "dist/cvx-$os-$arch.tar.gz" "$bin" "$@"
            rm "dist/$bin"
          }
          build darwin-arm64 darwin arm64 cvx     cvx.1
          build darwin-x64   darwin x64   cvx     cvx.1
          build linux-x64    linux  x64   cvx     cvx.1
          build linux-arm64  linux  arm64 cvx     cvx.1
          build windows-x64  win32  x64   cvx.exe          # Windows (no man page)
          ( cd dist && shasum -a 256 *.tar.gz | tee checksums.txt )

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            gh release upload "v$VERSION" dist/*.tar.gz dist/checksums.txt --clobber
          else
            gh release create "v$VERSION" dist/*.tar.gz dist/checksums.txt \
              --title "v$VERSION" --generate-notes
          fi

      - name: Bump Homebrew formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "::warning::TAP_TOKEN not set — skipping formula bump. Add a fine-grained PAT with Contents: Read & Write on rafay99-epic/homebrew-apps as the TAP_TOKEN secret to automate it."
            exit 0
          fi
          bash .github/scripts/bump-formula.sh

      # Runs last: GitHub release + Homebrew have already shipped, so an npm
      # scope/token problem can't block them.
      - name: Publish to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::warning::NPM_TOKEN not set — skipping npm publish. Add an npm automation token as the NPM_TOKEN secret to publish @rafay99/cvx + its 4 platform packages."
            exit 0
          fi
          bash .github/scripts/publish-npm.sh
